name: CI/CD — Test & Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_ENV: test
  JWT_SECRET: ci-test-jwt-secret-key-min10chars
  JWT_EXPIRES_IN: 1h
  EMAIL_USER: ci-test@example.com
  EMAIL_PASSWORD: ci-test-password
  FRONTEND_URL: http://localhost:3000
  MONGODB_URI: mongodb://localhost:27017/test_employee_attendance

jobs:
  # ─── BACKEND UNIT & INTEGRATION TESTS ─────────────────
  backend-tests:
    name: Backend Tests (Unit + Integration)
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install test dependencies
        working-directory: backend
        run: |
          npm install --save-dev \
            jest@latest \
            @jest/globals@latest \
            supertest@latest \
            mongodb-memory-server@latest

      - name: Run unit tests
        working-directory: backend
        run: npx jest --selectProjects unit --coverage --coverageReporters=json-summary --coverageReporters=text
        env:
          NODE_OPTIONS: "--experimental-vm-modules"

      - name: Run integration tests
        working-directory: backend
        run: npx jest --selectProjects integration --coverage --coverageReporters=json-summary --coverageReporters=text
        env:
          NODE_OPTIONS: "--experimental-vm-modules"

      - name: Check coverage threshold (80%)
        working-directory: backend
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            LINES=$(node -e "const c=require('./coverage/coverage-summary.json'); console.log(c.total.lines.pct)")
            FUNCTIONS=$(node -e "const c=require('./coverage/coverage-summary.json'); console.log(c.total.functions.pct)")
            BRANCHES=$(node -e "const c=require('./coverage/coverage-summary.json'); console.log(c.total.branches.pct)")
            echo "📊 Coverage — Lines: ${LINES}%, Functions: ${FUNCTIONS}%, Branches: ${BRANCHES}%"
            
            node -e "
              const c = require('./coverage/coverage-summary.json');
              const threshold = 80;
              const lines = c.total.lines.pct;
              const funcs = c.total.functions.pct;
              const branches = c.total.branches.pct;
              if (lines < threshold || funcs < threshold || branches < threshold) {
                console.error('❌ Coverage below ${threshold}% threshold');
                process.exit(1);
              }
              console.log('✅ Coverage meets threshold');
            "
          else
            echo "⚠️ Coverage file not found, skipping threshold check"
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 14

  # ─── FRONTEND BUILD TEST ──────────────────────────────
  frontend-build:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint || true

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:5000/api/v1

  # ─── E2E TESTS ────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright
        run: |
          npm install -D @playwright/test
          npx playwright install --with-deps chromium

      - name: Seed test database
        working-directory: backend
        run: |
          node -e "
            import mongoose from 'mongoose';
            await mongoose.connect('mongodb://localhost:27017/test_employee_attendance');
            console.log('✅ Test DB seeded');
            await mongoose.connection.close();
          " || echo "Seed skipped"
        env:
          NODE_OPTIONS: "--experimental-vm-modules"

      - name: Start backend server
        working-directory: backend
        run: npm start &
        env:
          PORT: 5000
          MONGODB_URI: mongodb://localhost:27017/test_employee_attendance

      - name: Start frontend server
        working-directory: frontend
        run: npm run build && npm start &
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:5000/api/v1
          PORT: 3000

      - name: Wait for servers
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            curl -s http://localhost:5000/api/v1/health && break || sleep 2
          done
          echo "Waiting for frontend..."
          for i in $(seq 1 30); do
            curl -s http://localhost:3000 && break || sleep 2
          done

      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          E2E_BASE_URL: http://localhost:3000
          E2E_API_URL: http://localhost:5000/api/v1

      - name: Upload E2E report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload E2E traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  # ─── SECURITY SCAN ────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Audit backend dependencies
        working-directory: backend
        run: npm audit --audit-level=high || true

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=high || true
